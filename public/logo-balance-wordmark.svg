<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="leftFigGradMini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3c4ad" />
      <stop offset="100%" stop-color="#7ba387" />
    </linearGradient>
    <linearGradient id="rightFigGradMini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5c4d4" />
      <stop offset="100%" stop-color="#7da2b8" />
    </linearGradient>
    <linearGradient id="walletGradMini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8cb296" />
      <stop offset="100%" stop-color="#7298af" />
    </linearGradient>
  </defs>

  <!-- Icon (48px scaled) -->
  <g transform="translate(0,20) scale(1.6875)">
    <rect
      x="16"
      y="16"
      width="64"
      height="64"
      rx="16"
      ry="16"
      fill="#fbf9f3"
      stroke="#e4e2dc"
      stroke-width="0.8"
    />

    <!-- Left figure head & body -->
    <circle cx="40" cy="34" r="5" fill="url(#leftFigGradMini)" />
    <path
      d="M48,41.6 C43.2,35.2 32.5,38 32.5,46 C32.5,55 40.5,63 48,68.5Z"
      fill="url(#leftFigGradMini)"
    />

    <!-- Right figure head & body -->
    <circle cx="56" cy="34" r="5" fill="url(#rightFigGradMini)" />
    <path
      d="M48,41.6 C52.8,35.2 63.5,38 63.5,46 C63.5,55 55.5,63 48,68.5Z"
      fill="url(#rightFigGradMini)"
    />

    <!-- Wallet -->
    <rect
      x="41"
      y="46.5"
      width="14"
      height="10"
      rx="2.5"
      fill="url(#walletGradMini)"
      stroke="#ffffff"
      stroke-width="0.8"
    />
    <rect
      x="47.2"
      y="48.8"
      width="7.8"
      height="5.4"
      rx="1.5"
      fill="url(#walletGradMini)"
      stroke="#ffffff"
      stroke-width="0.8"
    />
    <circle cx="52.2" cy="51.5" r="0.7" fill="#ffffff" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(130, 65)">
    <!-- Balance -->
    <text x="0" y="0" font-family="'Hanken Grotesk', system-ui, sans-serif" font-size="48" font-weight="600" letter-spacing="-0.03" fill="#1b1c18">Balance</text>
    <!-- Serene Capital -->
    <text x="0" y="32" font-family="'Geist', system-ui, monospace" font-size="13" font-weight="600" letter-spacing="0.22em" fill="#77786d" text-transform="uppercase">SERENE CAPITAL</text>
  </g>
</svg>

