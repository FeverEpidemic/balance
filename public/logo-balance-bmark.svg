<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C936D"/>
      <stop offset="100%" stop-color="#595f3d"/>
    </linearGradient>
    <!-- Light mode bg -->
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf9f3"/>
      <stop offset="100%" stop-color="#f5f4ed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="104" ry="104" fill="url(#bgLight)"/>

  <!-- B letter mark -->
  <g transform="translate(256,256)">
    <!-- B stem -->
    <rect x="-48" y="-100" width="36" height="200" rx="8" ry="8" fill="url(#bGrad)"/>
    <!-- B top bowl -->
    <path d="M-12,-100 Q72,-100 72,-52 Q72,-20 40,-4 Q20,6 -12,6 Z" fill="url(#bGrad)"/>
    <!-- B bottom bowl -->
    <path d="M-12,6 Q80,6 80,58 Q80,106 -12,106 Z" fill="url(#bGrad)"/>
    <!-- White negative space - top loop -->
    <path d="M-12,-72 Q44,-72 44,-52 Q44,-36 -12,-26 Z" fill="#fbf9f3" opacity="0.85"/>
    <!-- White negative space - bottom loop -->
    <path d="M-12,30 Q48,30 48,56 Q48,78 -12,78 Z" fill="#fbf9f3" opacity="0.85"/>
  </g>

  <!-- Subtle decorative dot -->
  <circle cx="120" cy="392" r="4" fill="#8C936D" opacity="0.3"/>

  <!-- Border -->
  <rect x="16" y="16" width="480" height="480" rx="104" ry="104" fill="none" stroke="#8C936D" stroke-width="2" opacity="0.12"/>
</svg>
