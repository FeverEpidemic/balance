<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="leftFigGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3c4ad" />
      <stop offset="100%" stop-color="#7ba387" />
    </linearGradient>
    <linearGradient id="rightFigGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5c4d4" />
      <stop offset="100%" stop-color="#7da2b8" />
    </linearGradient>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8cb296" />
      <stop offset="100%" stop-color="#7298af" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf9f3" />
      <stop offset="100%" stop-color="#f5f4ed" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="104" ry="104" fill="url(#bgGrad)" stroke="#e4e2dc" stroke-width="1.5" />

  <!-- Left figure — Green/Teal -->
  <circle cx="196" cy="150" r="38" fill="url(#leftFigGrad)" />
  <path
    d="M256,208 C220,160 140,180 140,240 C140,310 200,370 256,410 L256,208Z"
    fill="url(#leftFigGrad)"
  />

  <!-- Right figure — Blue/Slate -->
  <circle cx="316" cy="150" r="38" fill="url(#rightFigGrad)" />
  <path
    d="M256,208 C292,160 372,180 372,240 C372,310 312,370 256,410 L256,208Z"
    fill="url(#rightFigGrad)"
  />

  <!-- Central wallet with white border to pop -->
  <rect
    x="204"
    y="244"
    width="104"
    height="76"
    rx="18"
    fill="url(#walletGrad)"
    stroke="#ffffff"
    stroke-width="4"
  />
  <rect
    x="250"
    y="262"
    width="58"
    height="40"
    rx="10"
    fill="url(#walletGrad)"
    stroke="#ffffff"
    stroke-width="4"
  />
  <circle cx="288" cy="282" r="5" fill="#ffffff" />

  <!-- Subtle outer glow -->
  <rect x="16" y="16" width="480" height="480" rx="104" ry="104" fill="none" stroke="#8C936D" stroke-width="2" opacity="0.12" />
</svg>

