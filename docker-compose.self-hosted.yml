services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: balance-app:latest
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-no-reply@balance.local}
    depends_on:
      - db
      - auth
      - mailpit
      - redis
      - rest
    expose:
      - "3000"

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: balance-app:latest
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SCHEDULER_SUPABASE_URL: http://kong:8000
      RECURRING_SCHEDULER_INTERVAL_MS: ${RECURRING_SCHEDULER_INTERVAL_MS:-60000}
      RECURRING_SCHEDULER_BATCH_SIZE: ${RECURRING_SCHEDULER_BATCH_SIZE:-50}
    command: ["node", "scripts/run-recurring-scheduler.mjs"]
    depends_on:
      - kong
      - db
      - rest

  proxy:
    image: caddy:2.9-alpine
    depends_on:
      - app
      - kong
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - type: bind
        source: ./infra/Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
        bind:
          create_host_path: false
      - caddy_data:/data
      - caddy_config:/config

  db:
    image: supabase/postgres:15.8.1.049
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./infra/kong.yml:/var/lib/kong/kong.yml:ro
    expose:
      - "8000"
      - "8001"

  auth:
    image: supabase/gotrue:v2.177.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?search_path=auth
      GOTRUE_SITE_URL: ${APP_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${APP_SITE_URL}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-mailpit}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-1025}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_FROM:-no-reply@balance.local}
      GOTRUE_SMTP_SENDER_NAME: balance
    depends_on:
      - db
      - mailpit
    expose:
      - "9999"

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"

  rest:
    image: postgrest/postgrest:v12.2.8
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
    depends_on:
      - db
    expose:
      - "3000"

  meta:
    image: supabase/postgres-meta:v0.91.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: ${POSTGRES_USER}
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - db
    expose:
      - "8080"

  studio:
    image: supabase/studio:2025.11.26-sha-8f096b5
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - kong
      - meta
    expose:
      - "3000"

  backup:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: "chmod +x /usr/local/bin/backup.sh && while true; do /usr/local/bin/backup.sh; sleep 86400; done"
    depends_on:
      - db

volumes:
  db_data:
  caddy_data:
  caddy_config:
