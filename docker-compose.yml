services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: balance-app:latest
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    expose:
      - "3000"

  proxy:
    image: caddy:2.9-alpine
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
