services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: balance-app:latest
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    restart: unless-stopped
    expose:
      - "3000"

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: balance-app:latest
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SCHEDULER_SUPABASE_URL: ${SCHEDULER_SUPABASE_URL}
      RECURRING_SCHEDULER_INTERVAL_MS: ${RECURRING_SCHEDULER_INTERVAL_MS:-60000}
      RECURRING_SCHEDULER_BATCH_SIZE: ${RECURRING_SCHEDULER_BATCH_SIZE:-50}
    restart: unless-stopped
    command: ["node", "scripts/run-recurring-scheduler.mjs"]

  proxy:
    image: caddy:2.9-alpine
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - type: bind
        source: ./infra/Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
        bind:
          create_host_path: false
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
